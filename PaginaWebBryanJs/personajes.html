<header>
    <h1>Personajes Icónicos</h1>
    <nav>
        <ul class="menu">

<main class="flex-personajes">

    <section id="caja-buscador" class="seccion-buscador">
        <h2 class="titulo-buscador">Buscador de Base de Datos</h2>
        <p class="descripcion-buscador">Busca si un personaje de Mario o Sonic está registrado en el sistema.</p>
        
        <input type="text" id="personaje" class="caja-entrada" placeholder="Ej: Mario, Sonic, Luigi...">
        
        <button id="btn-buscar" class="boton-enviar" onclick="buscarPersonaje()">Buscar</button>
    </section>

    <article class="personaje">
        <h3>Mario</h3>
        <img src="IMG/Mario.png" alt="Mario">
        <p>El personaje más famoso de Nintendo.</p>
    </article>

    <article class="personaje">
        <h3>Sonic</h3>
        <img src="IMG/SONIC.jpg" alt="Sonic">
        <p>El erizo azul de SEGA.</p>
    </article>

</main>

<footer>
    <p> 2026 Historia de los Videojuegos</p>
</footer>
